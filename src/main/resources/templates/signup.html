<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sign Up — Library</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous"/>
</head>
<body>
<div class="container d-flex align-items-center justify-content-center" style="min-height:80vh;">
  <div class="card shadow-sm" style="width:400px;">
    <div class="card-body p-4">
      <h5 class="card-title mb-3">Create an Account</h5>

      <form th:action="@{/signup}" method="post" th:object="${user}" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" th:field="*{name}" required
                 th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"/>
          <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" th:field="*{email}" required
                 th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"/>
          <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" th:field="*{password}" required minlength="6"
                 th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"/>
          <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <div class="d-grid mb-3">
          <button class="btn btn-primary" type="submit">Sign Up</button>
        </div>
      </form>

      <div class="text-center">
        <small>Already have an account? <a th:href="@{/login}">Sign in</a></small>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
