<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${author.name} + ' — Library'">Author Detail — Library</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; }
    .sidebar { min-height: calc(100vh - 56px); background:#fff; border-right:1px solid #dee2e6; }
    .sidebar .nav-link { color:#495057; border-radius:.375rem; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background:#e9ecef; color:#0d6efd; }
    .card { border:none; box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .detail-label { font-size:.75rem; text-transform:uppercase; letter-spacing:.05em; color:#6c757d; font-weight:600; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand" th:href="@{/books}"><i class="bi bi-book-half me-2"></i>Library</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" th:href="@{/books}"><i class="bi bi-book me-1"></i>Books</a></li>
      <li class="nav-item"><a class="nav-link active" th:href="@{/authors}"><i class="bi bi-person me-1"></i>Authors</a></li>
    </ul>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 d-none d-md-block sidebar py-3 px-2">
      <ul class="nav flex-column gap-1">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/books}"><i class="bi bi-book me-2"></i>Books</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" th:href="@{/authors}"><i class="bi bi-person me-2"></i>Authors</a>
        </li>
      </ul>
    </nav>

    <main class="col-md-10 py-4 px-4">

      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a th:href="@{/authors}">Authors</a></li>
          <li class="breadcrumb-item active" th:text="${author.name}"></li>
        </ol>
      </nav>

      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="card">
            <div class="card-header bg-white border-bottom py-3">
              <h5 class="mb-0 fw-semibold">
                <i class="bi bi-person me-2 text-primary"></i>
                <span th:text="${author.name}"></span>
              </h5>
            </div>
            <div class="card-body p-4">

              <!-- Books by this author -->
              <div class="mb-4">
                <div class="detail-label mb-2">Books</div>
                <div th:if="${author.books == null or author.books.isEmpty()}"
                     class="text-muted fst-italic">No books associated with this author.</div>
                <div th:unless="${author.books == null or author.books.isEmpty()}"
                     class="d-flex flex-wrap gap-2">
                  <a th:each="book : ${author.books}"
                     th:href="@{/books/{id}(id=${book.id})}"
                     class="badge bg-primary bg-opacity-10 text-primary border border-primary-subtle text-decoration-none fs-6"
                     th:text="${book.title}"></a>
                </div>
              </div>

              <hr class="my-3"/>

              <div class="d-flex gap-2">
                <a th:href="@{/authors/{id}/edit(id=${author.id})}" class="btn btn-primary btn-sm">
                  <i class="bi bi-pencil me-1"></i>Edit
                </a>
                <button type="button"
                        class="btn btn-outline-danger btn-sm"
                        data-bs-toggle="modal"
                        data-bs-target="#deleteModal"
                        th:attr="data-author-id=${author.id}, data-author-name=${author.name}">
                  <i class="bi bi-trash me-1"></i>Delete
                </button>
                <a th:href="@{/authors}" class="btn btn-outline-secondary btn-sm ms-auto">
                  <i class="bi bi-arrow-left me-1"></i>Back to list
                </a>
              </div>

            </div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Delete modal -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title">
          <i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirm Deletion
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Are you sure you want to delete <strong id="deleteAuthorName"></strong>?
        This action cannot be undone.
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <form id="deleteForm" method="post">
          <button type="submit" class="btn btn-danger btn-sm">
            <i class="bi bi-trash me-1"></i>Delete
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXFMrWQ8I5/s5tnFkFZQnXkKp"
        crossorigin="anonymous"></script>
<script>
  document.getElementById('deleteModal').addEventListener('show.bs.modal', function (e) {
    const btn = e.relatedTarget;
    document.getElementById('deleteAuthorName').textContent = btn.getAttribute('data-author-name');
    document.getElementById('deleteForm').action = '/authors/' + btn.getAttribute('data-author-id') + '/delete';
  });
</script>
</body>
</html>
