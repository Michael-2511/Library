<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Authors — Library</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; }
    .sidebar { min-height: calc(100vh - 56px); background:#fff; border-right:1px solid #dee2e6; }
    .sidebar .nav-link { color:#495057; border-radius:.375rem; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background:#e9ecef; color:#0d6efd; }
    .card { border:none; box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .table thead th { background:#f1f3f5; font-size:.8rem; text-transform:uppercase; letter-spacing:.05em; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand" th:href="@{/books}"><i class="bi bi-book-half me-2"></i>Library</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" th:href="@{/books}"><i class="bi bi-book me-1"></i>Books</a></li>
      <li class="nav-item"><a class="nav-link active" th:href="@{/authors}"><i class="bi bi-person me-1"></i>Authors</a></li>
    </ul>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 d-none d-md-block sidebar py-3 px-2">
      <ul class="nav flex-column gap-1">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/books}"><i class="bi bi-book me-2"></i>Books</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" th:href="@{/authors}"><i class="bi bi-person me-2"></i>Authors</a>
        </li>
      </ul>
    </nav>

    <main class="col-md-10 py-4 px-4">

      <!-- Flash messages -->
      <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="mb-0 fw-semibold"><i class="bi bi-person me-2 text-primary"></i>Authors</h4>
          <small class="text-muted" th:text="${authors.size()} + ' author(s) found'"></small>
        </div>
        <a th:href="@{/authors/new}" class="btn btn-primary btn-sm">
          <i class="bi bi-plus-lg me-1"></i>Add Author
        </a>
      </div>

      <!-- Search -->
      <div class="card mb-4">
        <div class="card-body">
          <form th:action="@{/authors}" method="get" class="row g-2 align-items-end" novalidate>
            <div class="col-md-6">
              <label class="form-label small fw-semibold">Name</label>
              <input type="text" name="name" class="form-control form-control-sm"
                     placeholder="Search by name…"
                     th:value="${searchName}"
                     maxlength="200"/>
            </div>
            <div class="col-md-3 d-flex gap-2">
              <button type="submit" class="btn btn-outline-primary btn-sm flex-fill">
                <i class="bi bi-search me-1"></i>Search
              </button>
              <a th:href="@{/authors}" class="btn btn-outline-secondary btn-sm flex-fill"
                 th:if="${searching}">
                <i class="bi bi-x-lg"></i>
              </a>
            </div>
          </form>
        </div>
      </div>

      <!-- Table -->
      <div class="card">
        <div class="card-body p-0">
          <div th:if="${authors.isEmpty()}" class="text-center py-5 text-muted">
            <i class="bi bi-inbox display-4 d-block mb-2"></i>
            <span th:text="${searching} ? 'No authors match your search.' : 'No authors yet. Add the first one!'"></span>
          </div>

          <div th:unless="${authors.isEmpty()}" class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Books</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="author, stat : ${authors}">
                  <td class="text-muted small" th:text="${stat.index + 1}"></td>
                  <td>
                    <a th:href="@{/authors/{id}(id=${author.id})}"
                       class="fw-semibold text-decoration-none"
                       th:text="${author.name}"></a>
                  </td>
                  <td>
                    <span th:if="${author.books == null or author.books.isEmpty()}"
                          class="text-muted">—</span>
                    <span th:unless="${author.books == null or author.books.isEmpty()}"
                          class="badge rounded-pill text-bg-secondary"
                          th:text="${author.books.size()}"></span>
                  </td>
                  <td class="text-end">
                    <a th:href="@{/authors/{id}(id=${author.id})}"
                       class="btn btn-sm btn-outline-secondary me-1" title="View">
                      <i class="bi bi-eye"></i>
                    </a>
                    <a th:href="@{/authors/{id}/edit(id=${author.id})}"
                       class="btn btn-sm btn-outline-primary me-1" title="Edit">
                      <i class="bi bi-pencil"></i>
                    </a>
                    <button type="button"
                            class="btn btn-sm btn-outline-danger"
                            title="Delete"
                            data-bs-toggle="modal"
                            data-bs-target="#deleteModal"
                            th:attr="data-author-id=${author.id}, data-author-name=${author.name}">
                      <i class="bi bi-trash"></i>
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Delete modal -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title">
          <i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirm Deletion
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Are you sure you want to delete <strong id="deleteAuthorName"></strong>?
        This action cannot be undone.
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <form id="deleteForm" method="post">
          <button type="submit" class="btn btn-danger btn-sm">
            <i class="bi bi-trash me-1"></i>Delete
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXFMrWQ8I5/s5tnFkFZQnXkKp"
        crossorigin="anonymous"></script>
<script>
  document.getElementById('deleteModal').addEventListener('show.bs.modal', function (e) {
    const btn = e.relatedTarget;
    document.getElementById('deleteAuthorName').textContent = btn.getAttribute('data-author-name');
    document.getElementById('deleteForm').action = '/authors/' + btn.getAttribute('data-author-id') + '/delete';
  });
</script>
</body>
</html>
