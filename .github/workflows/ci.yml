name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: library_test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run tests with H2 (test profile)
        run: ./mvnw test -Dspring.profiles.active=test --batch-mode

      - name: Generate JaCoCo coverage report
        run: ./mvnw jacoco:report --batch-mode

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Build JAR
        run: ./mvnw package -DskipTests --batch-mode

      - name: Deploy to AWS Elastic Beanstalk
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_AWBD_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_AWBD_SECRET_ACCESS_KEY }}
          application_name: library-db-1
          environment_name: awbd-library-1
          version_label: ${{ github.sha }}
          region: us-east-1
          deployment_package: target/library-0.0.1-SNAPSHOT.jar
